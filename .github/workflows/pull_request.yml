name: Check Pull Request
on: [pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone project
        uses: actions/checkout@v6
      - name: Run luacheck
        uses: BigWigsMods/luacheck@main
        with:
          args: -q

      - name: Run validate
        uses: BigWigsMods/luacheck@main
        if: always()
        with:
          run_luacheck: false
          custom_script: scripts/validate.lua
          custom_args: .
